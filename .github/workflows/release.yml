name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  publish:
    outputs:
      version: ${{ steps.version.outputs.version }}
    runs-on: self-hosted
    environment: Configure npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.6.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Verify npm token is available
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "NPM_TOKEN is empty"
            exit 1
          fi
          echo "NPM_TOKEN is present"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Configure npm auth
        run: |
          cat > ~/.npmrc <<EOF
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          registry=https://registry.npmjs.org/
          always-auth=true
          EOF
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify tag matches package version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          test "${VERSION}" = "${TAG}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build package
        run: pnpm build

      - name: Pack npm tarball
        run: npm pack

      - name: Publish npm package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/hookvibe/hookcode-worker
          tags: |
            type=match,pattern=v(.*),group=1

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            *.tgz
          body: |
            Published artifacts:
            - npm: `@hookvibe/hookcode-worker@${{ steps.version.outputs.version }}`
            - ghcr: `ghcr.io/hookvibe/hookcode-worker:${{ steps.version.outputs.version }}`

  sync-hookcode:
    needs: publish
    runs-on: self-hosted
    environment: Configure npm
    steps:
      - name: Checkout hookcode dev
        uses: actions/checkout@v4
        with:
          repository: hookvibe/hookcode
          ref: dev
          token: ${{ secrets.HOOKCODE_REPO_TOKEN }}
          persist-credentials: false
          path: hookcode
          clean: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.6.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: hookcode/pnpm-lock.yaml

      - name: Sync hookcode worker version
        working-directory: hookcode
        run: node scripts/update-worker-version.cjs "${{ needs.publish.outputs.version }}"

      - name: Commit and push hookcode dev
        working-directory: hookcode
        env:
          VERSION: ${{ needs.publish.outputs.version }}
          HOOKCODE_REPO_TOKEN: ${{ secrets.HOOKCODE_REPO_TOKEN }}
        run: |
          if [ -z "${HOOKCODE_REPO_TOKEN:-}" ]; then
            echo "HOOKCODE_REPO_TOKEN is empty"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config http.version HTTP/1.1
          git remote set-url origin "https://x-access-token:${HOOKCODE_REPO_TOKEN}@github.com/hookvibe/hookcode.git"

          git add backend/package.json backend/src/modules/workers/worker-version-policy.ts docker/.env.example docker/docker-compose.yml docker/ci/write-ci-env.sh package.json pnpm-lock.yaml scripts/update-worker-version.cjs
          if git diff --cached --quiet; then
            echo "No hookcode changes to commit"
            exit 0
          fi

          git commit -m "chore: sync hookcode-worker to v${VERSION}"

          attempt=1
          max_attempts=4
          while [ "${attempt}" -le "${max_attempts}" ]; do
            echo "Push attempt ${attempt}/${max_attempts}"

            if git push origin HEAD:dev; then
              exit 0
            fi

            if [ "${attempt}" -eq "${max_attempts}" ]; then
              echo "git push failed after ${max_attempts} attempts"
              exit 1
            fi

            echo "git push failed, retrying after fetch/rebase"
            if ! git fetch origin dev; then
              echo "git fetch failed on attempt ${attempt}"
            elif ! git rebase origin/dev; then
              echo "git rebase origin/dev failed on attempt ${attempt}"
              echo "sync-hookcode hit a real rebase conflict and cannot auto-resolve"
              git status --short || true
              git rebase --abort || true
              exit 1
            fi

            sleep $((attempt * 5))
            attempt=$((attempt + 1))
          done
